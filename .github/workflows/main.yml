name: Python CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a script
        run: echo "Hello, GitHub Actions!"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3:11'

      - run: pip install pytest
      - run: pytest